{% extends 'base.html' %}

{% block content %}

<div class="container" style="width: 50%;">
    <div class="row shadow p-4 mt-5">
        <div class="w-100">
            
            <h1 class="form-title text-center pb-4">
                Définir un nouveau mot de passe
            </h1>

            {% if validlink %}

                <form method="post">
                    {% csrf_token %}

                    <div class="form-row">
                        <div class="col-md-12 mb-3">
                            <label for="{{ form.new_password1.id_for_label }}">
                                Nouveau mot de passe
                            </label>
                            {{ form.new_password1 }}
                        </div>

                        <div class="col-md-12 mb-3">
                            <label for="{{ form.new_password2.id_for_label }}">
                                Confirmer le mot de passe
                            </label>
                            {{ form.new_password2 }}
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Changer le mot de passe
                    </button>
                </form>

            {% else %}

                <div class="alert alert-danger text-center">
                    Ce lien est invalide ou expiré.
                </div>

                <div class="text-center mt-3">
                    <a href="{% url 'password_reset' %}" class="btn btn-secondary">
                        Demander un nouveau lien
                    </a>
                </div>

            {% endif %}

        </div>
    </div>
</div>

{% endblock %}
