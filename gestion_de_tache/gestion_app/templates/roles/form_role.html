{% extends 'base.html' %}


{% block content %}

    <div class="container mt-5">
        <h2 class="mb-4">
            {% if role %} Modifier un rôle {% else %} Créer un rôle {% endif %}
        </h2>

        <form method="POST">
            {% csrf_token %}

            <!-- Nom du rôle -->
            <div class="mb-3">
                <label class="form-label">Nom du rôle</label>
                <input type="text" name="name" class="form-control"
                    value="{{ role.name|default:'' }}" required>
            </div>

            <!-- Permissions -->
            <div class="mb-3">
                <label class="form-label">Permissions</label>

                <div class="row">
                    {% for perm in permissions %}
                    <div class="col-md-4">
                        <div class="form-check">
                            <input class="form-check-input"
                                type="checkbox"
                                name="permissions"
                                value="{{ perm.id }}"
                                {% if perm in role.permissions.all %}checked{% endif %}>

                            <label class="form-check-label">
                                {{ perm.name }}
                            </label>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <!-- Boutons -->
            <button type="submit" class="btn btn-primary">
                Enregistrer
            </button>

            <a href="{% url 'list_role' %}" class="btn btn-secondary">
                Retour
            </a>
        </form>
    </div>
{% endblock %}
