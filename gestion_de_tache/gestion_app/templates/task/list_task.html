{% extends 'base.html' %}

{% block content %}
<div class="d-flex" style="min-height: 100vh;">
   
    <div class="container-fluid py-4 px-4" style="flex: 1; background-color: #f8f9fa;">

        <div class="row g-4">
            <!-- afficher les tâches sur le dashboard -->
            <div class="col-lg-12">
                <div class="card shadow-sm">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Liste des tâches</h5>
                        <i class="fa fa-wave-pulse text-muted"></i>
                    </div>
                    <div class="card-body">
                        <a href="{% url 'task_create' %}" class="btn btn-primary mb-3">
                            <small><i class="bi bi-plus"></i></small> Ajouter une tâche
                        </a>
                        <table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>Titre</th>
                                    <th>Description</th>
                                    <th>Status</th>
                                    <th>Assigné à</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for task in tasks %}
                                <tr>
                                    <td>{{ task.title }}</td>
                                    <td>{{ task.description }}</td>
                                    <td>{% if task.status %}</td>
                                    <td>{{ task.assigned_to }}</td>
                                    <td>
                                        <a href="{% url 'task_detail' task.id %}" class="btn btn-info btn-sm"><i class="bi bi-eye "></i></a>
                                        <a href="{% url 'task_update' task.id %}" class="btn btn-warning btn-sm"><i class="bi bi-pencil "></i></a>
                                        <a href="{% url 'task_delete' task.id %}" class="btn btn-danger btn-sm"><i class="bi bi-trash "></i></a>
                                    </td>
                                </tr>
                                {% empty %}
                                <tr>
                                    <td colspan="4" class="text-center text-muted">Aucune tâche</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
