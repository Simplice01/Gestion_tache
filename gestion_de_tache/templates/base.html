<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
        <style>
            body{
                    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
                    padding: 0;
                    margin: 0;
                }

            .navbar .dropdown-menu {
                right: 0 !important;
                left: auto !important;
                transform: translateX(0) !important;
                min-width: 180px;
                }

            .navbar .dropdown {
                position: relative;
                }
        </style>

    <title>My Task</title>
  </head>
  <body>
        <nav class="navbar navbar-expand-lg navbar-light " style="background-color: rgb(19, 10, 121);">
        <a class="navbar-brand" href="#" style="color: rgba(245, 245, 245, 0.934); font-weight: bold; font-size: 30px;">My Task</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
            <ul class="navbar-nav ml-auto">
                {% if user.is_authenticated %}
                <li class="nav-item active">
                    <a class="nav-link" href="#" style="color: white;">Home <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" style="color: white;">Tâche</a>
                </li>
                {% else %}
                <li class="nav-item active">
                    <a class="nav-link" href="#" style="color: white;">Home <span class="sr-only">(current)</span></a>
                </li>
                {% endif %}
            </ul>
            <ul class="navbar-nav ">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" id="userDropdown" aria-expanded="false" style="color: white;">
                        <i class="bi bi-person"></i>
                    </a> 
                    
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        {% if user.is_authenticated %}
                            <li><a class="dropdown-item" href="{#}">Se déconnecter</a></li>
                        {% else %}
                            <li><a class="dropdown-item" href="#">S'inscrire</a></li>
                            <li><a class="dropdown-item" href="#">Se connecter</a></li>
                        {% endif %}
                    </ul>
                    
                </li>
            </ul>
        </div>
        </nav>
       

    {% block content %}

    {% endblock %}


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
